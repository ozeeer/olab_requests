<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#f7f7f5"/>
<meta name="color-scheme" content="light only"/>
<title>Order Requests</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
:root { color-scheme: light only; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: #f7f7f5; color: #111; min-height: 100vh; padding-bottom: 120px; color-scheme: light only; }

/* header */
.header { background: #f7f7f5; border-bottom: 1px solid #222; padding: 16px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; font-weight: 500; letter-spacing: -0.02em; }
.header-sub { font-size: 11px; color: #666; margin-top: 1px; }
.sync-pill { display: flex; align-items: center; gap: 5px; background: #ffffff; border: 1px solid #e0e0de; border-radius: 20px; padding: 5px 10px; font-size: 11px; color: #888; white-space: nowrap; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #3a8f1f; }
.dot.off { background: #dc2626; }
.dot.spin { background: #d97706; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

/* content */
.content { padding: 12px 14px; max-width: 600px; margin: 0 auto; }

/* stats */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.stat { background: #ffffff; border: 1px solid #e8e8e6; border-radius: 10px; padding: 12px 10px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 500; color: #111; letter-spacing: -0.03em; }
.stat-l { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

/* search */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #999; pointer-events: none; }
.search { width: 100%; padding: 10px 12px 10px 34px; background: #ffffff; border: 1px solid #e0e0de; border-radius: 10px; color: #111; font-family: inherit; font-size: 14px; outline: none; }
.search::placeholder { color: #bbb; }
.search:focus { border-color: #bbb; }

/* chips */
.chips { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; border: 1px solid #e0e0de; background: #ffffff; color: #666; cursor: pointer; font-family: inherit; }
.chip.on { background: rgba(58,143,31,.1); border-color: rgba(58,143,31,.4); color: #3a8f1f; }
.chip.requested.on { background: rgba(217,119,6,.1); border-color: rgba(217,119,6,.4); color: #b45309; }

/* items */
.item { background: #ffffff; border: 1px solid #e8e8e6; border-radius: 12px; display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
.item:active { background: #f0f0ee; }
.thumb { width: 52px; height: 52px; border-radius: 8px; background: #f0f0ee; border: 1px solid #e0e0de; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb svg { color: #bbb; }
.info { flex: 1; min-width: 0; }
.iname { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #111; }
.isub { font-size: 12px; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tags { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
.tag-req { background: rgba(217,119,6,.1); color: #b45309; }
.tag-pending { background: rgba(0,0,0,.07); color: #555; }
.tag-new { background: rgba(58,143,31,.1); color: #3a8f1f; }
.idate { font-size: 10px; color: #bbb; font-family: 'DM Mono', monospace; flex-shrink: 0; }

/* empty */
.empty { text-align: center; padding: 60px 20px; color: #999; }
.empty h3 { font-size: 15px; color: #888; margin: 10px 0 6px; }

/* bottom bar */
.bottom-bar { position: sticky; top: 56px; z-index: 9; padding: 10px 14px; background: #f7f7f5; border-bottom: 1px solid #e8e8e6; }
.bottom-add-btn { width: 100%; padding: 14px; background: #111; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; letter-spacing: -0.01em; }
.bottom-add-btn:active { opacity: .8; }

/* overlay + sheet */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { background: #ffffff; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding-bottom: 30px; }
.handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto; }
.sheet-hdr { padding: 4px 16px 14px; display: flex; align-items: center; border-bottom: 1px solid #222; gap: 10px; }
.sheet-hdr h2 { font-size: 15px; font-weight: 500; flex: 1; letter-spacing: -.01em; }
.x-btn { width: 28px; height: 28px; border-radius: 50%; background: #f0f0ee; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #888; flex-shrink: 0; }
.sheet-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

/* photo */
.photo-strip { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.photo-strip::-webkit-scrollbar { display: none; }
.ptile { position: relative; width: 80px; height: 80px; flex-shrink: 0; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0de; }
.ptile img { width: 100%; height: 100%; object-fit: cover; }
.pdel { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,.55); border: none; border-radius: 50%; color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.padd { width: 80px; height: 80px; flex-shrink: 0; border-radius: 8px; border: 1.5px dashed #ccc; background: #f0f0ee; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: #999; font-size: 11px; }
.padd svg { width: 20px; height: 20px; }

/* form */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: #999; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; }
.field input, .field select, .field textarea { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #e0e0de; border-radius: 8px; background: #f0f0ee; color: #111; font-family: inherit; outline: none; appearance: none; -webkit-appearance: none; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #999; }
.field input::placeholder, .field textarea::placeholder { color: #bbb; }
.field select option { background: #f0f0ee; }
.field textarea { min-height: 70px; font-size: 13px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btns { display: flex; gap: 8px; }
.btn { padding: 12px; font-size: 14px; border-radius: 8px; border: 1px solid #e0e0de; background: #f0f0ee; color: #111; cursor: pointer; font-family: inherit; font-weight: 500; flex: 1; }
.btn:active { opacity: .7; }
.btn-g { background: #111; color: #fff; border-color: #111; }
.btn-g:disabled { opacity: .35; cursor: not-allowed; }
.btn-r { color: #dc2626; border-color: rgba(255,92,92,.2); background: rgba(255,92,92,.06); }
.btn-amber { background: #b45309; color: #fff; border-color: #b45309; }

/* detail */
.dphoto { width: 100%; border-radius: 8px; object-fit: cover; border: 1px solid #e0e0de; margin-bottom: 8px; cursor: zoom-in; display: block; }
.drow { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0ee; gap: 12px; font-size: 13px; }
.drow:last-child { border: none; }
.dk { color: #999; flex-shrink: 0; }
.dv { color: #333; text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; word-break: break-all; }

/* name overlay */
.name-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; padding:24px; }
.name-overlay.open { display:flex; }
.name-box { background:#fff; border-radius:16px; padding:28px 24px; width:100%; max-width:360px; }
.name-box h2 { font-size:18px; font-weight:500; margin-bottom:6px; letter-spacing:-0.02em; }
.name-box p { font-size:13px; color:#888; margin-bottom:20px; }
.name-input { width:100%; padding:12px; font-size:15px; border:1px solid #e0e0de; border-radius:8px; font-family:inherit; outline:none; color:#111; background:#f7f7f5; }
.name-input:focus { border-color:#aaa; }
.name-submit { width:100%; margin-top:10px; padding:13px; background:#111; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:500; font-family:inherit; cursor:pointer; }
.name-submit:active { opacity:.8; }

/* lightbox */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.96); z-index:9999; align-items:center; justify-content:center; padding:16px; }
.lightbox.open { display:flex; }
.lightbox img { max-width:100%; max-height:100vh; object-fit:contain; border-radius:4px; }
.lightbox-close { position:fixed; top:16px; right:16px; width:40px; height:40px; background:rgba(255,255,255,.2); border:none; border-radius:50%; color:#fff; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10000; }
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="https://raw.githubusercontent.com/ozeeer/olab_packages/main/ozbolat_lab_logo.png" style="height:24px;width:auto;" alt="Ozbolat Lab"/>
    <div>
      <div style="font-size:16px;font-weight:500;letter-spacing:-.02em;color:#111;">Order Requests</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button onclick="showNamePrompt()" style="font-size:13px;font-weight:500;color:#111;background:none;border:1px solid #e0e0de;border-radius:20px;padding:5px 10px;cursor:pointer;font-family:inherit;">👤 <span id="user-name-text">Set name</span></button>
    <div class="sync-pill"><div class="dot spin" id="sdot"></div><span id="slabel">Connecting</span></div>
  </div>
</div>

<!-- ADD BUTTON -->
<div class="bottom-bar">
  <button class="bottom-add-btn" onclick="openAdd()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    New Order Request
  </button>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="s-pending">—</div><div class="stat-l">Not Requested</div></div>
    <div class="stat"><div class="stat-n" id="s-req">—</div><div class="stat-l">Requested</div></div>
  </div>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    <input class="search" id="search" placeholder="Search item, vendor, catalog…" oninput="renderList()"/>
  </div>

  <div class="chips" id="chips"></div>
  <div id="list"></div>
</div>

<!-- ADD SHEET -->
<div class="overlay" id="add-ov" onclick="if(event.target===this)closeAdd()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-hdr">
      <h2>New Request</h2>
      <button class="x-btn" onclick="closeAdd()"><svg width="11" height="11" viewBox="0 0 11 11"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
    </div>
    <div class="sheet-body">
      <div class="photo-strip" id="pstrip"></div>
      <input type="file" id="f-photo" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)"/>
      <div class="field"><label>Item Name *</label><input id="f-name" placeholder="e.g. PBS 10X Solution"/></div>
      <div class="row2">
        <div class="field"><label>Quantity *</label><input id="f-qty" placeholder="e.g. 2 bottles"/></div>
        <div class="field"><label>Catalog # / Vendor</label><input id="f-cat" placeholder="e.g. Sigma #P5493"/></div>
      </div>
      <div class="field"><label>Added by *</label><input id="f-req" placeholder="Your name"/></div>
      <div class="field"><label>Notes / Reason</label><textarea id="f-notes" placeholder="Why is it needed? Running low? Expiring?"></textarea></div>
      <div class="btns">
        <button class="btn" onclick="closeAdd()">Cancel</button>
        <button class="btn btn-g" id="savebtn" onclick="saveRequest()">Add to List</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="det-ov" onclick="if(event.target===this)closeDet()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-hdr">
      <h2 id="d-name"></h2>
      <button class="x-btn" onclick="closeDet()"><svg width="11" height="11" viewBox="0 0 11 11"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
    </div>
    <div class="sheet-body">
      <div id="d-photo-wrap"></div>
      <div id="d-rows"></div>
      <div class="btns" id="d-btns"></div>
    </div>
  </div>
</div>

<!-- NAME OVERLAY -->
<div class="name-overlay" id="name-overlay">
  <div class="name-box">
    <h2>Welcome 👋</h2>
    <p>Enter your name so the lab knows who submitted each request.</p>
    <input class="name-input" id="name-input" placeholder="Your name" maxlength="40" onkeydown="if(event.key==='Enter')saveName()"/>
    <button class="name-submit" onclick="saveName()">Get started</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()"/>
</div>

<!-- FOOTER -->
<div style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:8px 16px;font-size:11px;color:#bbb;letter-spacing:0.04em;background:#f7f7f5;border-top:1px solid #e8e8e6;z-index:5;">
  Ozbolat Lab &nbsp;·&nbsp; 2026 &nbsp;·&nbsp; Made by Ozer
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBSKapCk66FSg7ruOman4WRXzQbRJ_j7kk",
  authDomain: "inventory-ol.firebaseapp.com",
  databaseURL: "https://inventory-ol-default-rtdb.firebaseio.com",
  projectId: "inventory-ol",
  storageBucket: "inventory-ol.firebasestorage.app",
  messagingSenderId: "647528240069",
  appId: "1:647528240069:web:72de037a6c20d9dcbb31ac"
});

const db = firebase.database();
const ordersRef = db.ref('order_requests');

let items = [];
let imgs = [];
let detId = null;
let filter = 'all';
let userName = localStorage.getItem('lab_order_user') || '';

// ── Name ──
function showNamePrompt() {
  document.getElementById('name-input').value = userName || '';
  document.getElementById('name-overlay').classList.add('open');
}
function saveName() {
  const v = document.getElementById('name-input').value.trim();
  if (!v) return;
  userName = v;
  localStorage.setItem('lab_order_user', v);
  document.getElementById('name-overlay').classList.remove('open');
  document.getElementById('user-name-text').textContent = userName;
  document.getElementById('f-req').value = userName;
}
function initName() {
  if (!userName) document.getElementById('name-overlay').classList.add('open');
  else document.getElementById('user-name-text').textContent = userName;
}
document.addEventListener('DOMContentLoaded', initName);

// ── Firebase ──
ordersRef.on('value', snap => {
  items = [];
  snap.forEach(c => { items.push({ id: c.key, ...c.val() }); });
  items.reverse();
  document.getElementById('sdot').className = 'dot';
  document.getElementById('slabel').textContent = 'Live';
  updateStats();
  renderChips();
  renderList();
}, () => {
  document.getElementById('sdot').className = 'dot off';
  document.getElementById('slabel').textContent = 'Offline';
});

function updateStats() {
  document.getElementById('s-total').textContent = items.length;
  document.getElementById('s-pending').textContent = items.filter(i => i.status === 'Not Requested').length;
  document.getElementById('s-req').textContent = items.filter(i => i.status === 'Requested').length;
}

function renderChips() {
  const html = [
    `<button class="chip${filter==='all'?' on':''}" onclick="setFilter('all')">All</button>`,
    `<button class="chip${filter==='Not Requested'?' on':''}" onclick="setFilter('Not Requested')">Not Requested</button>`,
    `<button class="chip requested${filter==='Requested'?' on':''}" onclick="setFilter('Requested')">Requested ✓</button>`
  ].join('');
  document.getElementById('chips').innerHTML = html;
}

function setFilter(f) { filter = f; renderChips(); renderList(); }

function renderList() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let filtered = items.filter(it => {
    const mq = !q || [it.name, it.qty, it.catalog, it.requester, it.notes].some(f => f && f.toLowerCase().includes(q));
    const mf = filter === 'all' || it.status === filter;
    return mq && mf;
  });

  if (!filtered.length) {
    document.getElementById('list').innerHTML = `<div class="empty">
      <div style="font-size:36px">📋</div>
      <h3>${items.length === 0 ? 'No requests yet' : 'No matches'}</h3>
      <p style="font-size:13px">${items.length === 0 ? 'Tap the button above to add a request' : 'Try a different search'}</p>
    </div>`;
    return;
  }

  document.getElementById('list').innerHTML = filtered.map(it => {
    const thumb = it.photo
      ? `<div class="thumb"><img src="${it.photo}" alt=""/></div>`
      : `<div class="thumb"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.4"/><path d="M9 9h6M9 12h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div>`;
    const isNew = Date.now() - it.ts < 86400000;
    const statusTag = it.status === 'Requested'
      ? `<span class="tag tag-req">✓ Requested</span>`
      : `<span class="tag tag-pending">Not Requested</span>`;
    const sub = [it.qty, it.catalog].filter(Boolean).join(' · ');
    return `<div class="item" onclick="openDet('${it.id}')">
      ${thumb}
      <div class="info">
        <div class="iname">${esc(it.name) || '<span style="color:#bbb;font-style:italic;">Unnamed</span>'}</div>
        <div class="isub">${esc(sub)}${it.requester ? '<span style="color:#bbb">' + (sub ? ' · ' : '') + esc(it.requester) + '</span>' : ''}</div>
        <div class="tags">
          ${statusTag}
          ${isNew ? '<span class="tag tag-new">New</span>' : ''}
        </div>
      </div>
      <div class="idate">${fmtDate(it.ts)}</div>
    </div>`;
  }).join('');
}

// ── Add ──
function openAdd() {
  imgs = [];
  document.getElementById('f-name').value = '';
  document.getElementById('f-qty').value = '';
  document.getElementById('f-cat').value = '';
  document.getElementById('f-req').value = userName || '';
  document.getElementById('f-notes').value = '';
  document.getElementById('savebtn').disabled = false;
  document.getElementById('savebtn').textContent = 'Add to List';
  renderStrip();
  document.getElementById('add-ov').classList.add('open');
}
function closeAdd() { document.getElementById('add-ov').classList.remove('open'); }

function renderStrip() {
  document.getElementById('pstrip').innerHTML = imgs.map((img, i) => `
    <div class="ptile">
      <img src="${img}" alt=""/>
      <button class="pdel" onclick="removeImg(${i})">×</button>
    </div>`).join('') +
    `<div class="padd" onclick="document.getElementById('f-photo').click()">
      <svg viewBox="0 0 20 20" fill="none"><path d="M17 15H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h3l2-2h4l2 2h3a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg>
      ${imgs.length ? 'Add more' : 'Add photo'}
    </div>`;
}

function removeImg(i) { imgs.splice(i, 1); renderStrip(); }

function onPhoto(e) {
  const f = e.target.files[0]; if (!f) return; e.target.value = '';
  compress(f, img => { imgs.push(img); renderStrip(); });
}

function compress(file, cb) {
  const r = new FileReader();
  r.onload = ev => {
    const im = new Image();
    im.onload = () => {
      const MAX = 800, c = document.createElement('canvas');
      let w = im.width, h = im.height;
      if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(im, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.72));
    };
    im.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

async function saveRequest() {
  const name = document.getElementById('f-name').value.trim();
  const qty = document.getElementById('f-qty').value.trim();
  const req = document.getElementById('f-req').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  if (!qty) { document.getElementById('f-qty').focus(); return; }
  const btn = document.getElementById('savebtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await ordersRef.push({
      name,
      qty,
      catalog: document.getElementById('f-cat').value.trim(),
      requester: req || userName || 'Unknown',
      notes: document.getElementById('f-notes').value.trim(),
      photo: imgs[0] || '',
      status: 'Not Requested',
      ts: Date.now(),
      requestedBy: '',
      requestedAt: ''
    });
    closeAdd();
  } catch(e) {
    alert('Save failed: ' + e.message);
    btn.disabled = false; btn.textContent = 'Add to List';
  }
}

// ── Detail ──
function openDet(id) {
  const it = items.find(x => x.id === id); if (!it) return;
  detId = id;
  document.getElementById('d-name').textContent = it.name || 'Unnamed item';
  document.getElementById('d-photo-wrap').innerHTML = it.photo
    ? `<img class="dphoto" src="${it.photo}" onclick="openLightbox(this.src)" alt=""/>`
    : '';
  const rows = [
    ['Quantity', it.qty],
    ['Catalog / Vendor', it.catalog],
    ['Added by', it.requester],
    ['Notes', it.notes],
    ['Status', it.status],
    ['Requested by', it.requestedBy],
    ['Requested at', it.requestedAt ? fmtDateTime(parseInt(it.requestedAt)) : ''],
    ['Added', fmtDateTime(it.ts)]
  ].filter(([,v]) => v);
  document.getElementById('d-rows').innerHTML = rows.map(([k,v]) =>
    `<div class="drow"><span class="dk">${esc(k)}</span><span class="dv">${esc(v)}</span></div>`
  ).join('');

  const btns = document.getElementById('d-btns');
  if (it.status === 'Not Requested') {
    btns.innerHTML = `
      <button class="btn btn-r" onclick="delItem()">Delete</button>
      <button class="btn btn-amber" onclick="markRequested('${id}')">Mark as Requested</button>`;
  } else {
    btns.innerHTML = `
      <button class="btn btn-r" onclick="delItem()">Delete</button>
      <button class="btn" onclick="markNotRequested('${id}')">Undo</button>
      <button class="btn btn-g" onclick="closeDet()">Done</button>`;
  }
  document.getElementById('det-ov').classList.add('open');
}
function closeDet() { document.getElementById('det-ov').classList.remove('open'); detId = null; }

async function delItem() {
  if (!detId || !confirm('Delete this request?')) return;
  await ordersRef.child(detId).remove();
  closeDet();
}

async function markRequested(id) {
  try {
    await ordersRef.child(id).update({
      status: 'Requested',
      requestedBy: userName || 'Unknown',
      requestedAt: String(Date.now())
    });
    closeDet();
  } catch(e) { alert('Update failed: ' + e.message); }
}

async function markNotRequested(id) {
  try {
    await ordersRef.child(id).update({
      status: 'Not Requested',
      requestedBy: '',
      requestedAt: ''
    });
    closeDet();
  } catch(e) { alert('Update failed: ' + e.message); }
}

// ── Lightbox ──
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── Helpers ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtDateTime(ts) { return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
</script>
